[pytest]
# Run tests with verbose output and capture stdout/stderr
addopts = -v -s --html=reports/report.html --self-contained-html

# ------------------------------------------------------------------
# Logging configuration (captures logs to console and a file)
# ------------------------------------------------------------------
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s %(levelname)s %(message)s

log_file = logs/pytest.log
log_file_level = INFO
log_file_format = %(asctime)s %(levelname)s %(message)s
log_file_date_format = %Y-%m-%d %H:%M:%S

# Ensure that even failed tests retain their captured output
log_auto_indent = false